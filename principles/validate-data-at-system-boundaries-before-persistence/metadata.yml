id: validate-data-at-system-boundaries-before-persistence
name: Validate Data at System Boundaries Before Persistence
status: draft
version: 0.1.0
category: data-integrity
risk_level: high
summary: Any data that crosses a system boundary into persistent, external, shared, or long-lived storage must be validated before it is written.
applies_to:
  - persistence
  - external-integrations
  - search
  - retrieval
  - memory
  - analytics
  - event-stores
  - indexing
does_not_apply_to:
  - short-lived-ui-state
  - temporary-request-local-data
  - explicitly-raw-ingestion
recommended_artifacts:
  - adr
  - rule
  - checklist
  - implementation-guide
  - eval
eval_status: experimental
agent_triggers:
  - writes to persistent storage
  - writes to external systems
  - creates sync flows
  - modifies persistence adapters
  - adds search or retrieval indexes
  - writes agent memory or reasoning artifacts
  - changes ownership, provenance, or visibility metadata
adoption_maturity: experimental
related_principles:
  - persist-propagation-intent-in-source-of-truth-transaction
  - version-persisted-data-for-backward-compatible-evolution
